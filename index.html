<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RogueZ · 僵鸽</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-shell">
    <header class="topbar">
      <div>
        <h1 class="game-title"><span class="game-title-en">RogueZ</span><span class="game-title-sep">·</span><span id="gameTitleSuffix" class="game-title-cn">僵鸽</span></h1>
        <p id="pageSubtitle">俯视角生存肉鸽，自动锁敌射击，撑过尸潮并击败 BOSS。</p>
      </div>
    </header>

    <section class="game-panel">
      <canvas id="gameCanvas" width="960" height="540"></canvas>

      <div id="hud" class="hud">
        <div><span id="hudLblHp"></span> <span id="hpText">0 / 0</span></div>
        <div><span id="hudLblLevel"></span> <span id="levelText">1</span></div>
        <div><span id="hudLblXp"></span> <span id="xpText">0 / 0</span></div>
        <div><span id="hudLblKills"></span> <span id="killsText">0</span></div>
        <div><span id="hudLblTime"></span> <span id="timeText">00:00</span></div>
        <div><span id="hudLblWave"></span> <span id="waveText">1</span></div>
        <div><span id="hudLblWeapons"></span> <span id="weaponText">—</span></div>
      </div>

      <div id="message" class="message">清理尸潮，尽可能活得更久。</div>

      <div id="bossBar" class="boss-bar hidden">
        <div class="boss-bar-header">
          <span id="bossWave">BOSS WAVE</span>
        </div>
        <div class="boss-bar-name-row">
          <span id="bossName">尸王</span>
        </div>
        <div class="boss-bar-track">
          <div id="bossHpFill" class="boss-bar-fill"></div>
        </div>
      </div>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
          <h2 id="overlayTitle">开始游戏</h2>
          <p id="overlayText">选择一项强化。</p>
          <div id="upgradeOptions" class="upgrade-options"></div>
        </div>
      </div>

      <div id="touchControls" class="touch-controls">
        <div class="touch-hint">触屏拖动摇杆移动，武器会自动射击</div>
        <div id="joystick" class="joystick">
          <div id="joystickKnob" class="joystick-knob"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="i18n.js"></script>
  <script src="game.js"></script>
</body>
</html>
